<div class="card border-light mx-4 mt-4">
    <div class="card-header">
      <div class="row">
        <div class="col-md-10">
          <h5 class="card-title">ตรวจสอบไปราชการ</h5>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="shadow alert alert-info" role="alert">
        <div class="row">
          <div class="col">
            <!-- BASIC TABLE -->
            <div class="panel">
              <div class="panel-heading">
                <div class="row">
                  <div class="col-md-4 text-secondary" style="font-size: 10pt">
                    <label> หน่วยเบิกจ่าย: </label>
                    <input type="hidden" class="form-control" name="PRIVILEGE_RSTATUS" id="PRIVILEGE_RSTATUS"
                      [(ngModel)]="dataAdd.PRIVILEGE_RSTATUS">
                    <select name="f_code" id="f_code" class="form-select" [(ngModel)]="dataAdd.CAMPUS_CODE"
                      (change)="fetchdataCam()" >
                      <option value="" *ngIf="dataAdd.PRIVILEGE_RSTATUS=='A' || dataAdd.PRIVILEGE_RSTATUS!='1'">
                        ทุกวิทยาเขต
                      </option>
                      <option [value]="cam.CAMPUS_CODE" *ngFor="let cam of dataCam">{{cam.CAMPUS_TNAME}}</option>
                    </select>
                  </div>
                  <div class="col-md-6 text-secondary" style="font-size: 10pt">
                    <label> คณะ /หน่วยงาน: </label>
                    <select name="f_code" id="f_code" class="form-select" [(ngModel)]="dataAdd.FACULTY_CODE"
                     >
                      <option value="" *ngIf="dataAdd.PRIVILEGE_RSTATUS=='A' || dataAdd.PRIVILEGE_RSTATUS!='1'">
                        ทุกคณะ/หน่วยงาน</option>
                      <option [value]="fac.FACULTY_CODE" *ngFor="let fac of dataFac">{{fac.FACULTY_TNAME}}</option>
                    </select>
                  </div>
                  <div class="col-md-2 " style="font-size: 10pt">
                    <label>ปีงบประมาณ: </label>
                    <select name="y_code" id="y_code" class="form-select" [(ngModel)]="dataAdd.PLYEARBUDGET_CODE"
                      >
                      <option [value]="year.PLYEARBUDGET_CODE" *ngFor="let year of dataYear">{{year.PLYEARBUDGET_CODE}}
                      </option>
                    </select>
                  </div>
                </div>

                
                <div class="row">
                  <div class="col-md-2 text-secondary" style="font-size: 10pt"> จากวันที่:</div>
                  <div class="col-md-2 text-secondary" style="font-size: 10pt"> ถึงวันที่:</div>
  
                </div>
                <div class="row">
                  <div class="col-md-2" style="font-size: 10pt">
                    <input placeholder="จากวันที่" type="text" class="form-control" bsDatepicker #dp="bsDatepicker"
                      [(ngModel)]="dataAdd.DATENOWS" readonly>
                    <i style="margin-top: -1.6rem;float: right;font-size:15px; margin-right: 6px;cursor:pointer;"
                      class="fa-solid fa-calendar-days cursor-p text-primary" (click)="dp.toggle()">
                    </i>
                  </div>
                  <div class="col-md-2" style="font-size: 10pt">
                    <input placeholder="ถึงวันที่" type="text" class="form-control" bsDatepicker #dp2="bsDatepicker"
                      [(ngModel)]="dataAdd.DATENOWT" readonly>
                    <i style="margin-top: -1.6rem;float: right;font-size:15px; margin-right: 6px;cursor:pointer;"
                      class="fa-solid fa-calendar-days cursor-p text-primary" (click)="dp2.toggle()">
                    </i>
                  </div>
                  <div class="col-md-2 ">
                    <button type="submit" class="btn btn-primary" id="submitinsert" (click)="fetchdatalist()"><i
                        class="fa fa-search"></i>&nbsp;ค้นหา</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
        <br>
        <div class="row justify-content-center center-screen" *ngIf="loading">
          <div class="spinner-border " role="status" id="loading"></div>
        </div>
        <div *ngIf="rownum" class="row">
          <div class="col-md-2"><button type="button" class="btn btn-success" (click)="exportexcel()"> <i
                class="fa-sharp fa-solid fa-file-excel"></i>&nbsp;Export
              Excel</button></div>
          <div class="col-md-7"></div>
          <div class="col-md-3">
            <input type="text" class="form-control" placeholder="ค้นหาข้อมูล" [(ngModel)]="searchTerm">
          </div>
        </div>
      
          <table *ngIf="rownum" id="excel-table" class="table btn-font3" width="100%"
            class="table table-bordered table-striped table-hover tableFixHead btn-font3">
            <thead>
              <tr class="bg-info">
                <th>
                  <div align="center">ที่</div>
                </th>
                <th>
                  <div align="center">ชื่อ-สกุล</div>
                </th>
                <th>
                  <div align="center">ประเภท</div>
                </th>
                <th>
                  <div align="center">รายการ</div>
                </th>
                <th>
                  <div align="center">วันที่</div>
                </th>
                <th>
                  <div align="center">วันที่ส่งใช้เงินยืม</div>
                </th>
                <th>
                  <div align="center">สถานที่</div>
                </th>
                <th>
                  <div align="center">งบประมาณ</div>
                </th>
                <th>
                  <div align="center">สถานะ</div>
                </th>
              </tr>
            </thead>
            <tbody>
              <!--  <tr *ngFor="let p of dataYear ; index as i" >-->
  
              <tr class="btn-font2" *ngFor="let p of datalist|filter:searchTerm ; let i = index">
                <td  align="center">{{+i+1}}</td>
                <td >{{p.FSTF_FNAME}}</td>
                <td >{{p.TYPETRAIN_NAME}}</td>
                <td >{{p.FNANNALS_BOOK_SUB}}</td>
                <td >{{p.DATE_REQUEST}}</td>
                <td >{{p.FNLISTBW_EXPDATE}}</td>
                <td >{{p.FNANNALS_BOOK_AT}}</td>
                <td >{{p.PLINCOME_NAME}}</td>
                <td >{{p.FNCSTATUS_NAME}}</td> 
              </tr>
 
  
            </tbody>
          </table>
        
      </div>
    </div>
