<div class="card border-light mx-4 mt-4">
    <div class="card-header">
        <div class="row">
            <div class="col-md-10">
                <h5 class="card-title">สิทธิการใช้งานระบบ</h5>
            </div>
            <div class="col-md-2" align="right">
                <a class="btn btn-primary text-white" data-bs-toggle="modal" data-bs-target="#modalEdit"
                    (click)="showinput()" (click)="setshowbti()">
                    <i class="fa fa-plus-circle"></i> เพิ่มรายการใหม่</a>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col">
                <!-- BASIC TABLE -->
                <div class="panel">
                    <div class="panel-heading">
                        <div class="row justify-content-center center-screen" *ngIf="loading">
                            <div class="spinner-border " role="status" id="loading"></div>
                        </div>
                        <div class="shadow alert alert-info" role="alert">
                            <div class="row">
                                <div align="right" class="col-md-1">แสดงข้อมูล</div>
                                <div align="right" class="col-md-1">
                                    <select (change)="onTableSizeChange($event)" class="form-select">
                                        <option *ngFor="let size of tableSizes" [ngValue]="size">
                                            {{ size }}
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-4"></div>
                                <div class="col-md-3">
                                    <select name="y_code" id="y_code" class="form-select" [(ngModel)]="dataAdd.MAINPROGRAM_CODE" (change)="fetchdatalist()" (change)="onChangstatus()">
                                        <option [value]="main.MAINPROGRAM_CODE" *ngFor="let main of datamainprogram">{{main.MAINPROGRAM_NAME}}
                                        </option>
                                      </select>
                                </div>
                                <div class="col-md-3">
                                    <div class="input-group">
                                        <input class="form-control border-end-0 border" type="search"
                                            placeholder="ค้นหาข้อมูล" id="example-search-input"
                                            [(ngModel)]="searchTerm">
                                        <span class="input-group-append">
                                            <button
                                                class="btn btn-outline-secondary bg-white border-start-0 border-bottom-0 border ms-n5"
                                                type="button">
                                                <i class="fa fa-search"></i>
                                            </button>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="overflow-auto">
                        <table width="100%" id="example"
                            class="shadow-lg table table-bordered  table-striped table-hover btn-font3">
                            <thead>
                                <tr class="bg-primary text-white">
                                    <th><div align="center">ที่</div></th>
                                    <th><div align="center">ชื่อ-สกุล</div></th>
                                    <th><div align="center">คณะ/หน่วยงาน</div></th>
                                    <th><div align="center">ชื่อระบบ</div></th>
                                    <th><div align="center">สถานะการใช้งาน</div></th>
                                    <th><div align="center">จัดการข้อมูล</div></th>
                                </tr>
                            </thead>
                            <tbody>
                                <!--  <tr *ngFor="let p of dataYear ; index as i" >-->

                                <tr *ngFor="let p of datalist|filter:searchTerm|paginate : {
                      itemsPerPage: tableSize,
                      currentPage: page,
                      totalItems: count
                      } ; let i = index">
                                    <td align="center">{{(page*tableSize)-tableSize+i+1}}</td>
                                    <td>{{p.STF_FNAME}}</td>
                                    <td>{{p.FACULTY_TNAME}} </td>
                                    <td>{{p.MAINPROGRAM_NAME}} </td>
                                    <td>{{p.MAINPROGRAMSTATUS_NAME}}</td>
                                    <td align="center">
                                        <a role="button" title="ลบข้อมูล" class="btn btn-danger text-white"
                                            (click)="deleteData(p.PRIVILEGE_CODE)"><i class="fa fa-trash"></i>
                                        </a>&nbsp;
                                        <a role="button" title="แก้ไข" data-bs-toggle="modal"
                                            data-bs-target="#modalEdit" class="btn btn-warning text-white"
                                            (click)="editdata(p.PRIVILEGE_CODE,p.STF_FNAME)"><i
                                                class="fa fa-edit"></i></a>
                                    </td>
                                </tr>
                                <tr *ngIf="!rownum">
                                    <td colspan="8">ไม่มีข้อมูล{{rownum}}</td>
                                </tr>
                            </tbody>
                        </table>
                   
                        <div class="d-flex justify-content-left">
                            <pagination-controls previousLabel="Prev" nextLabel="Next"
                                (pageChange)="onTableDataChange($event)">
                            </pagination-controls>
                        </div>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Modal -->

<div class="modal fade" id="modalEdit" data-bs-backdrop="static" data-bs-keyboard="false" aria-hidden="true" aria-labelledby="exampleModalToggleLabel" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header bg-primary">
                <h5 class="modal-title text-white" id="exampleModalToggleLabel">{{dataAdd.htmlStringd}}</h5>
                <button type="button" class="btn-close bg-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">

                <div class="row">
                    <div class="form-group col-md-1"></div>
                    <div class="form-group col-md-10">
                        <label for="name">สถานะ</label>
                        <select name="y_code" id="y_code" class="form-select" [(ngModel)]="dataAdd.MAINPROGRAMSTATUS_CODE" (change)="onChangname($event)">
                            <option value="" >กรุณาเลือก</option>
                            <option [value]="status.MAINPROGRAMSTATUS_CODE" *ngFor="let status of datastatusprogram">{{status.MAINPROGRAMSTATUS_NAME}}
                            </option>
                          </select>
                    </div>
                    <div class="form-group col-md-1"></div>
                    <div class="form-group col-md-1"></div>
                    <div class="form-group col-md-10">
                        <label for="name">คณะ/หน่วยงาน</label>
                        <select name="y_code" id="y_code" class="form-select" [(ngModel)]="dataAdd.FACULTY_CODE">
                            <option [value]="fac.FACULTY_CODE" *ngFor="let fac of dataFac">{{fac.FACULTY_TNAME}}
                            </option>
                          </select>
                    </div>
                    <div class="form-group col-md-1"></div>
                    <div class="form-group col-md-1"></div>
                    <div class="form-group col-md-10">
                        <input name="USERSYSLOG_CODE" type="hidden" id="USERSYSLOG_CODE"
                            [(ngModel)]="dataAdd.USERSYSLOG_CODE" />
                        <input name="PRIVILEGE_RSTATUS" type="hidden" id="PRIVILEGE_RSTATUS" [(ngModel)]="dataAdd.PRIVILEGE_RSTATUS" />
                        <label for="name">ชื่อ-สกุล</label>
                        <input name="USERSYSLOG_CODE" type="hidden" id="USERSYSLOG_CODE" [(ngModel)]="dataAdd.USERSYSLOG_CODE" />
                        <div class="ng-autocomplete">
                            <ng-autocomplete [(ngModel)]="dataAdd.CITIZEN_ID1" [data]="datacomplete"
                                [searchKeyword]="keyword" placeholder="ชื่อ-สกุล" (selected)='selectEvent($event)'
                                (inputChanged)='onChangeSearch($event)' [itemTemplate]="itemTemplate"
                                [notFoundTemplate]="notFoundTemplate">
                            </ng-autocomplete>
                            <ng-template #itemTemplate let-item>
                                <a [innerHTML]="item.name"></a>
                            </ng-template>
                            <ng-template #notFoundTemplate let-notFound>
                                <div [innerHTML]="notFound"></div>
                            </ng-template>
                        </div>
                    </div>
                    <div class="form-group col-md-1"></div>

                </div>
            </div>
            <div class="modal-footer">
                <button id="ModalClose" type="button" class="btn btn-secondary" data-bs-dismiss="modal">ปิด</button>
                <button *ngIf="rowpbi" type="button" class="btn btn-primary"
                    (click)="insertdata()">บันทึกข้อมูล</button>
                <button *ngIf="rowpbu" type="button" class="btn btn-primary" (click)="updatedata()">แก้ไขข้อมูล</button>
            </div>
        </div>
    </div>
</div>
